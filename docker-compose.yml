version: "3.9"

services:
  api:
    build:
      context: .
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./output:/app/output
      - ./config:/app/config
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
    command: ["python", "-m", "bi_validator.services.queue.worker"]
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./config:/app/config
    depends_on:
      - postgres
      - redis

  scheduler:
    build:
      context: .
    command: ["python", "-m", "bi_validator.services.queue.scheduler"]
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./config:/app/config
    depends_on:
      - redis

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bi_validator
      POSTGRES_USER: validator
      POSTGRES_PASSWORD: validator
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres-data:
